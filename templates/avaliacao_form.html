<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>{{ 'Editar' if avaliacao else 'Nova' }} Avaliação - {{ aluno.nome }}</title>
</head>
<body>
    <h1>
        {{ 'Editar' if avaliacao else 'Nova' }} Avaliação Física — {{ aluno.nome }}
    </h1>

    {% for msg in get_flashed_messages() %}
        <p style="color: red;">{{ msg }}</p>
    {% endfor %}

    <form method="POST">
        Data:
        <input 
            type="date" 
            name="data_avaliacao" 
            value="{{ avaliacao.data_avaliacao if avaliacao else '' }}" 
            required
        >
        <br>

        Peso (kg):
        <input 
            type="number" 
            step="0.01" 
            name="peso" 
            value="{{ avaliacao.peso if avaliacao else '' }}" 
            required
        >
        <br>

        % de Gordura:
        <input 
            type="number" 
            step="0.01" 
            name="percentual_gordura" 
            value="{{ avaliacao.percentual_gordura if avaliacao and avaliacao.percentual_gordura is not none else '' }}"
        >
        <br>

        Observações:
        <textarea name="observacoes">{{ avaliacao.observacoes if avaliacao else '' }}</textarea>
        <br>

        <button type="submit">Salvar</button>
    </form>

    <br>

    <a href="{{ url_for('listar_avaliacoes', aluno_id=aluno.id) }}">
        Voltar
    </a>
</body>
</html>
