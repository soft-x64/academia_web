{% extends "base.html" %}

{% block page_title %}Exercícios{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1>{% if exercicio %}Editar Exercício{% else %}Cadastrar Exercício{% endif %}</h1>
    </div>
</div>

<div class="form-card">
    <div class="form-card-body">
        <form method="POST">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Nome do Exercício</label>
                    <input type="text" name="nome" class="form-control" value="{{ exercicio.nome if exercicio else '' }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Grupo Muscular</label>
                    <select name="grupo_muscular" class="form-select" required>
                        <option value="">Selecione...</option>
                        <option value="Peito" {% if exercicio and exercicio.grupo_muscular == 'Peito' %}selected{% endif %}>Peito</option>
                        <option value="Costas" {% if exercicio and exercicio.grupo_muscular == 'Costas' %}selected{% endif %}>Costas</option>
                        <option value="Pernas" {% if exercicio and exercicio.grupo_muscular == 'Pernas' %}selected{% endif %}>Pernas</option>
                        <option value="Braços" {% if exercicio and exercicio.grupo_muscular == 'Braços' %}selected{% endif %}>Braços</option>
                    </select>
                </div>
                <div class="col-md-12">
                    <label class="form-label">Descrição / Instruções</label>
                    <textarea name="descricao" class="form-control" rows="2">{{ exercicio.descricao if exercicio else '' }}</textarea>
                </div>
            </div>
            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Salvar</button>
                <a href="{{ url_for('listar_exercicios') }}" class="btn btn-outline-secondary">Voltar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
