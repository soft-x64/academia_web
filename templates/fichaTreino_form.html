{% extends "base.html" %}

{% block page_title %}Fichas de Treino{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1>{% if ficha %}Editar Ficha{% else %}Criar Nova Ficha{% endif %}</h1>
    </div>
</div>

<div class="form-card">
    <div class="form-card-body">
        <form method="POST">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Aluno</label>
                    <select name="aluno_id" class="form-select" required>
                        <option value="">Selecione o aluno...</option>
                        {% for aluno in alunos %}
                            <option value="{{ aluno.id }}" {% if ficha and ficha.aluno_id == aluno.id %}selected{% endif %}>{{ aluno.nome }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Instrutor Responsável</label>
                    <select name="instrutor_id" class="form-select" required>
                        <option value="">Selecione o instrutor...</option>
                        {% for instrutor in instrutores %}
                            <option value="{{ instrutor.id }}" {% if ficha and ficha.instrutor_id == instrutor.id %}selected{% endif %}>{{ instrutor.nome }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Data de Início</label>
                    <input type="date" name="data_inicio" class="form-control" value="{{ ficha.data_inicio if ficha else '' }}" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Data de Vencimento</label>
                    <input type="date" name="data_vencimento" class="form-control" value="{{ ficha.data_vencimento if ficha else '' }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Objetivo (Ex: Hipertrofia)</label>
                    <input type="text" name="objetivo" class="form-control" value="{{ ficha.objetivo if ficha else '' }}" required>
                </div>
            </div>
            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Salvar Ficha</button>
                <a href="{{ url_for('listar_fichas') }}" class="btn btn-outline-secondary">Voltar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
